spring:
  profiles:
    active: dev
    include: secret  # 引入敏感配置文件
  datasource:
    url: jdbc:mysql://localhost:3306/chuchenblog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: smtp.qq.com
    port: 587
    username: ${mail.username}
    password: ${mail.password}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connection timeout: 5000
          timeout: 5000
          write timeout: 5000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.chuchen.blog.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${jwt.secret}
  expiration: 86400000

aliyun:
  oss:
    access-key-id: ${aliyun.oss.access-key-id}
    access-key-secret: ${aliyun.oss.access-key-secret}
    bucket-name: chuchenblog
    endpoint: oss-cn-beijing.aliyuncs.com

file:
  upload-type: oss
  upload-path: /tmp/uploads
  domain: https://chuchenblog.oss-cn-beijing.aliyuncs.com

server:
  port: 8082
